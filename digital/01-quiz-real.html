<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디지털 시대의 기록 — 실제 퀴즈 모음집</title>
<style>
  :root{ --ink:#1a1a1a; --sub:#666; --line:#d9d9d9; --faint:#f4f4f4; --hit:#000; }
  *{box-sizing:border-box;}
  body{margin:0;background:#fff;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    line-height:1.7;font-size:17px;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;padding:48px 24px 120px;}
  h1{font-size:26px;font-weight:700;margin:0 0 4px;}
  .lead{color:var(--sub);font-size:15px;margin:0 0 20px;}
  .bar{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);
    padding:12px 0;margin-bottom:20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;z-index:5;}
  button.ctl{font:inherit;font-size:14px;border:1px solid var(--ink);background:#fff;color:var(--ink);
    padding:6px 14px;border-radius:4px;cursor:pointer;}
  button.ctl:hover{background:var(--faint);}
  .score{font-size:14px;color:var(--sub);margin-left:auto;}
  .sec{border-top:2px solid var(--ink);margin-top:34px;padding-top:14px;font-size:17px;font-weight:700;}
  .sec.pred{border-top-color:#999;}
  .sec .badge{display:inline-block;font-size:12px;font-weight:600;color:var(--sub);
    border:1px solid var(--line);border-radius:3px;padding:1px 7px;margin-left:8px;}
  .note{border-left:3px solid #999;background:#f7f7f7;padding:12px 16px;margin:14px 0 4px;
    font-size:14px;color:#444;}
  .q{border-top:1px solid var(--line);padding:20px 0 6px;}
  .qhead{font-weight:700;margin-bottom:10px;}
  .qnum{display:inline-block;min-width:30px;color:var(--sub);}
  .opt{display:block;width:100%;text-align:left;font:inherit;border:1px solid var(--line);
    background:#fff;color:var(--ink);padding:8px 12px;margin:5px 0;border-radius:4px;cursor:pointer;}
  .opt:hover{background:var(--faint);}
  .opt .mk{display:inline-block;min-width:22px;color:var(--sub);}
  .opt.correct{border-color:var(--hit);border-width:2px;font-weight:700;background:#f0f0f0;}
  .opt.correct .mk{color:var(--hit);}
  .opt.wrong{color:var(--sub);text-decoration:line-through;}
  .exp{display:none;border-left:3px solid var(--ink);background:var(--faint);
    padding:10px 14px;margin:8px 0 2px;font-size:15px;color:#333;}
  .exp.show{display:block;}
  .exp b{font-weight:700;}
  .essay{border:1px solid var(--line);border-radius:4px;padding:4px 0;}
  .essay .reveal{font:inherit;font-size:14px;border:none;background:none;color:#444;
    text-decoration:underline;cursor:pointer;padding:8px 12px;}
  .essay .model{display:none;border-left:3px solid var(--ink);background:var(--faint);
    padding:10px 14px;margin:4px 0 2px;font-size:15px;color:#333;}
  .essay .model.show{display:block;}
  .locked .opt{cursor:default;}
  .foot{border-top:2px solid var(--ink);margin-top:40px;padding-top:18px;font-size:14px;color:var(--sub);}
  @media print{
    .bar{display:none;}
    .opt{cursor:default;}
    .exp,.essay .model{display:block !important;}
    .opt.correct{background:#eee;}
    body{font-size:11pt;}
    .wrap{padding:0;}
    .q{break-inside:avoid;}
  }
</style>
</head>

<script>
const DATA = [
 {sec:`9주차 · 1차시`, sub:`디지털 사회의 변화와 역사`},
 {q:`디지털 사회 4단계를 시간 순서대로 올바르게 나열한 것은?`,
  o:[`자동화사회 → 스마트사회 → 연결망사회 → 지능사회`,`연결망사회 → 자동화사회 → 스마트사회 → 지능사회`,`자동화사회 → 연결망사회 → 스마트사회 → 지능사회`,`스마트사회 → 자동화사회 → 연결망사회 → 지능사회`],a:2,
  e:`자동화(1960~80s) → 연결망(1990~2000s) → 스마트(2007~2015) → 지능(2016~). 효율 → 연결 → 접근성 → 자율 지능의 흐름.`},
 {q:`자동화사회(1단계)의 가장 큰 구조적 한계로 옳은 것은?`,

 {q:`1969년 아폴로 11호 달 착륙에 사용된 유도 컴퓨터(AGC)의 메모리 용량은?`,

 {q:`연결망사회(2단계)로의 전환을 이끈 두 가지 핵심 계기를 올바르게 묶은 것은?`,
  o:[`1981 IBM PC 출시 + 1998 구글 창업`,`1983 TCP/IP 표준 채택 + 1991 WWW 공개`,`1975 FMS 정립 + 1986 CIM 도입`,`2004 페이스북 + 2006 AWS`],a:1,
  e:`1983 TCP/IP 표준화(인터넷 원형) + 1991 WWW 공개(웹 시대). '접촉'에서 '접속' 중심 사회로 전환.`},
 {q:`알파고와 이세돌의 대국(2016)이 디지털 사회 역사에서 갖는 의미로 가장 적절한 것은?`,
  o:[`AI가 처음으로 체스에서 인간 챔피언을 이긴 사건`,`딥러닝이 처음 상업화된 전환점`,`지능사회(4단계) 시작의 상징이자 AI 대중 인식의 전환점`,`한국 정부가 AI 국가전략을 처음 수립한 계기`],a:2,

 {sec:`9주차 · 2차시`, sub:`데이터 법제도·빅데이터·AI 역사`},
 {q:`한국 데이터 3법(2020)에서 도입한 '가명정보' 개념에 대한 설명으로 옳은 것은?`,
  o:[`완전히 삭제해 복원 불가능하게 처리한 정보`,`추가 정보 없이는 식별 불가하되, 통계·연구·공익 목적에 동의 없이 활용 가능한 정보`,`국가기관만 열람 가능하도록 암호화된 민감정보`,`당사자 명시적 동의를 받아 기업 간 공유 가능한 정보`],a:1,
  e:`가명정보 = 추가 정보 없이는 식별 불가 + 통계·과학적 연구·공익적 기록보존 목적에 동의 없이 활용 가능. ①은 익명정보에 가까움.`},
 {q:`EU GDPR과 미국 CCPA의 차이를 가장 잘 설명한 것은?`,
  o:[`GDPR은 Opt-out, CCPA는 Opt-in`,`GDPR은 사전 동의(Opt-in), CCPA는 거부 요청(Opt-out) 방식`,`두 규제 모두 동일한 과징금을 부과`,`CCPA는 국외 이전을 엄격 제한, GDPR은 허용`],a:1,
  e:`GDPR=사전 동의(Opt-in, 개인 우선), CCPA=거부 요청(Opt-out, 기업 활용 후 거부 가능).`},
 {q:`멧칼프의 법칙(Metcalfe's Law)에 대한 설명으로 옳은 것은?`,
  o:[`네트워크의 가치는 사용자 수에 비례한다`,`AI 성능은 학습 데이터 양의 제곱근에 비례한다`,`네트워크의 가치는 사용자 수의 제곱에 비례한다`,`플랫폼 수익은 사용자 1,000명을 넘는 순간 선형 증가한다`],a:2,
  e:`네트워크 가치 ∝ 사용자 수의 제곱(n²). 연결망사회·플랫폼 경제의 핵심 원리.`},
 {q:`AI 역사에서 '3차 붐(2012~현재)'이 이전 붐들과 근본적으로 다른 점은?`,
  o:[`정부 연구비가 더 많이 투입됐다`,`전문가 규칙을 코딩하는 방식에서, 데이터로부터 스스로 패턴을 학습하는 방식으로 전환됐다`,`처음으로 AI가 체스에서 인간을 이겼다`,`AI 반도체가 처음 상용화돼 비용이 낮아졌다`],a:1,
  e:`규칙 기반(전문가 시스템) → 데이터 기반 학습(머신러닝/딥러닝)으로의 패러다임 전환. 2012 ImageNet의 CNN 성과가 기점.`},
 {q:`2017년 구글이 발표한 트랜스포머(Transformer) 아키텍처의 핵심 메커니즘은?`,
  o:[`CNN을 활용한 이미지 분류`,`생성자·판별자가 경쟁하는 GAN 구조`,`문장 내 모든 단어가 서로를 참조하는 Attention 메커니즘`,`단순 퍼셉트론 연결`],a:2,
  e:`Attention(셀프 어텐션) 메커니즘. GPT·BERT 등 대형언어모델(LLM)의 이론적 기반.`},

 {sec:`9주차 · 3차시`, sub:`빅데이터 5V·AI 규제·마이데이터`},
 {q:`빅데이터 5V 중 'Veracity(신뢰성)'에 대한 설명으로 가장 적절한 것은?`,
  o:[`초당 수천 건을 실시간 처리하는 능력(속도)`,`텍스트·이미지·영상 등 다양한 형태를 포함(다양성)`,`기존 도구로 처리하기 어려운 방대한 양(규모)`,`가짜·오류·편향 없이 신뢰할 수 있는 품질 확보`],a:3,
  e:`Veracity = 데이터 품질·신뢰성, 노이즈 제거. 나머지는 Velocity·Variety·Volume.`},
 {q:`EU AI Act에서 '허용 불가(Unacceptable Risk)' 등급으로 분류되는 AI는?`,
  o:[`게임 전용 AI`,`일반 고객 서비스 챗봇`,`의료 진단 보조 AI`,`감시 목적의 실시간 생체인식 AI`],a:3,
  e:`실시간 원격 생체인식 등 기본권을 중대 침해하는 AI는 '허용 불가' 등급으로 금지. 위험 기반 4단계 분류.`},
 {q:`마이데이터(MyData)의 핵심 개념으로 가장 적절한 것은?`,
  o:[`국가가 개인 데이터를 일괄 관리해 행정 효율을 높이는 제도`,`개인이 자신의 데이터를 직접 통제하고 원하는 사업자에게 전송 요청할 수 있는 권리`,`기업이 수집한 데이터를 무상으로 개인에게 돌려줄 의무`,`빅데이터 분석 결과를 누구나 열람하게 공개하는 정책`],a:1,
  e:`마이데이터 = 정보주체가 자기 데이터를 직접 통제·이동(전송요구)하는 데이터 주권. 전송요구권이 법적 수단.`},
 {q:`에이전트 AI(Agentic AI)가 기존 생성형 AI(ChatGPT 등)와 구별되는 가장 큰 특징은?`,
  o:[`더 많은 파라미터의 대형 모델을 쓴다`,`이미지·영상 생성에 특화돼 있다`,`질문 답변을 넘어, 스스로 도구를 사용해 여러 단계 작업을 자율 수행한다`,`온디바이스에서만 실행된다`],a:2,
  e:`에이전트 AI = 자율적으로 도구를 사용해 다단계 작업을 수행. 단순 응답형 생성 AI와 구분되는 핵심.`},
 {q:`'기술과 제도의 시차'와 관련한 설명으로 옳지 않은 것은?`,
  o:[`알파고(2016)와 EU AI Act 발효(2024) 사이엔 약 8년 시차가 있다`,`딥페이크·알고리즘 차별·개인정보 침해는 기술-제도 시차로 발생한다`,`기술이 항상 제도보다 빨라 제도 선제 설계는 불가능하다`,`데이터 3법(2020)은 AI 확산에 대응한 제도적 노력의 사례다`],a:2,
  e:`③이 틀림. 시차는 존재하지만 제도의 '선제적 설계'는 가능하며 강의가 지향하는 방향. 나머지는 모두 옳음.`},

 {sec:`10주차 · 1차시`, sub:`DIKW 피라미드·정보의 정의`},
 {q:`DIKW 피라미드에서 "A상품이 오늘 100개 판매되었다"는 POS 집계 결과는 어느 단계인가?`,
  o:[`데이터(Data)`,`정보(Information)`,`지식(Knowledge)`,`지혜(Wisdom)`],a:1,
  e:`정보(Information). 원천 수치(100, $50)는 데이터, 목적에 맞게 집계·가공되면 정보.`},
 {q:`컴퓨터공학에서 정의하는 정보(Information)의 생성 공식으로 가장 적절한 것은?`,
  o:[`데이터 × 기술`,`데이터 ÷ 용량`,`자료(Data) + 의도(Intent)`,`지식 − 노이즈`],a:2,
  e:`정보 = 자료(Data) + 의도(Intent). 목적성 개입·재배열·가공을 거쳐 의미를 가짐.`},
 {q:`DIKW 피드백 루프(Recursive Improvement)에 대한 설명으로 옳은 것은?`,
  o:[`데이터를 반복 수집해 저장 용량을 늘리는 과정`,`지혜 단계의 통찰이 다시 데이터 수집 방식을 개선하는 순환 구조`,`정보를 지식으로 바꾸는 단방향 흐름`,`지식과 지혜 사이에서만 발생하는 제한적 순환`],a:1,
  e:`상향 진화(데이터→지혜)뿐 아니라, 지혜의 통찰이 데이터 수집을 개선하는 순환(피드백 루프) 구조.`},
 {q:`2020년 데이터 3법 개정의 핵심 내용으로 옳은 것은?`,
  o:[`공공데이터 포털 최초 개설`,`마이데이터 사업 및 금융 데이터 이동권 도입`,`가명정보 활용을 허용해 데이터 경제 활성화 기반 마련`,`빅데이터 개념을 최초로 법제화`],a:2,
  e:`2020 데이터 3법의 핵심은 '가명정보' 도입으로 동의 없는 데이터 활용 기반을 마련해 데이터 경제를 연 것.`},
 {q:`지식(Knowledge) 단계의 특성을 가장 잘 설명한 것은?`,
  o:[`가공되지 않은 1차 원본 자료`,`목적에 맞게 정제·가공되어 의미를 갖게 된 데이터`,`근본 원리를 이해하고 창의적 통찰로 전략을 수립하는 능력`,`패턴을 인식하고 경험과 결합해 예측이 가능해진 상태`],a:3,
  e:`지식 = 패턴 인식 + 경험 결합 → 예측 가능('어떻게'의 이해). ③은 지혜, ①데이터, ②정보.`},

 {sec:`10주차 · 2차시`, sub:`공공데이터·데이터 리터러시 격차`},
 {q:`공공데이터법상 공공기관이 데이터 제공 요청에 결정을 통보해야 하는 법정 기한은?`,
  o:[`3일 이내`,`7일 이내`,`10일 이내`,`30일 이내`],a:2,
  e:`10일 이내. (개인정보 권리 행사 처리기한도 동일하게 10일 이내로 기억하면 편함)`},
 {q:`2025년 기준 계층별 데이터 리터러시 격차 현황으로 옳은 것은?`,
  o:[`65세 이상 활용 비율은 청년층과 거의 동일하다`,`저소득 가구의 역량은 고소득 대비 평균 2.4단계 낮다`,`비수도권 중소도시 활용 경험률이 서울보다 10%p 높다`,`지역 격차보다 소득 격차가 훨씬 작다`],a:1,
  e:`저소득 가구의 데이터 리터러시가 고소득 대비 평균 2.4단계 낮음. 소득이 격차의 핵심 변수.`},
 {q:`빅데이터 3V 중 정형·반정형·비정형 데이터가 혼재하는 특성은?`,
  o:[`Volume(규모)`,`Velocity(속도)`,`Veracity(정확성)`,`Variety(다양성)`],a:3,
  e:`Variety(다양성) = 형태의 다양성. 3V = Volume·Velocity·Variety.`},
 {q:`공공데이터 제공의 3대 핵심 원칙에 해당하지 않는 것은?`,
  o:[`개방 원칙 — 원칙적 공개, 예외적 비공개`,`활용 원칙 — 수정·재배포·상업적 이용 허용`,`독점 원칙 — 특정 기관만 우선 접근`,`무료 원칙 — 기본적으로 무상 제공`],a:2,
  e:`3대 원칙 = 개방·활용·무료. '독점'은 공공데이터 정신과 정반대.`},

 {sec:`10주차 · 3차시`, sub:`빅데이터 5V·공공데이터 정책`},
 {q:`빅데이터 5V 중 "품질·신뢰성, 노이즈 제거로 분석 타당성을 확보하는 요소"는?`,
  o:[`Volume`,`Visualization`,`Velocity`,`Veracity`],a:3,
  e:`Veracity(신뢰성). 9주차와 반복 출제되는 핵심.`},
 {q:`공공데이터 포털(data.go.kr) 오픈 API의 기본 일일 허용 트랜잭션 수는?`,
  o:[`100건`,`10,000건`,`1,000건`,`500건`],a:2,
  e:`기본 1,000건/일.`},
 {q:`제5차 공공데이터 기본계획(2026~2028)의 핵심 목표로 가장 적절한 것은?`,
  o:[`AI G3 도약과 연계한 고품질 데이터셋 구축 및 품질 인증제도 도입`,`공공데이터 전면 유료화`,`단순 파일 데이터 개방량 10배 확대`,`공공데이터 접근을 정부 기관으로 제한`],a:0,
  e:`AI G3 도약 연계 + 고품질 데이터셋 + 품질 인증제도. '양적 개방'에서 '질·AI 활용' 중심으로 진화.`},
 {q:`데이터 과학(Data Science)의 정의로 가장 올바른 것은?`,
  o:[`빅데이터 3V를 분류·정리하는 학문`,`프로그래밍 언어만을 활용하는 순수 기술 분야`,`DB 관리·저장에 특화된 정보관리 학문`,`통계·컴퓨팅·도메인 지식의 융합으로 데이터에서 가치를 추출하는 학문`],a:3,
  e:`데이터 과학 = 통계 + 컴퓨팅 + 도메인 지식의 융합.`},
 {q:`공공데이터 정책의 진화 방향을 순서대로 올바르게 나열한 것은?`,
  o:[`단순 개방(1.0) → 데이터 연계(2.0) → 데이터 경제(3.0) → AI·지능형 생태계(4.0+)`,`데이터 경제(1.0) → 단순 개방(2.0) → AI 생태계(3.0) → 데이터 연계(4.0)`,`AI 생태계(1.0) → 데이터 연계(2.0) → 데이터 경제(3.0) → 단순 개방(4.0)`,`단순 개방(1.0) → AI 생태계(2.0) → 데이터 경제(3.0) → 데이터 연계(4.0)`],a:0,
  e:`개방(1.0) → 연계(2.0) → 경제(3.0) → AI 생태계(4.0+).`},

 {sec:`12주차 · 1차시`, sub:`개인정보 법적 정의·유형`},
 {q:`개인정보보호법 제2조의 개인정보 핵심 요건으로 올바르게 묶인 것은?`,
  o:[`법인 정보 포함 + 단독 식별 필수`,`살아있는 개인 + 식별 가능성 + 결합 용이성`,`살아있는 개인 + 고유식별번호 보유 + 단독 식별 가능`,`디지털 형태로 저장된 정보 + 살아있는 개인`],a:1,
  e:`살아있는 개인 + 식별 가능성 + (다른 정보와의) 결합 용이성. 사망자·법인은 원칙적 제외.`},
 {q:`가명정보와 익명정보에 대한 설명으로 옳은 것은?`,
  o:[`가명정보는 법 적용 대상이 아니어서 자유롭게 활용 가능하다`,`익명정보는 재식별 가능성이 남아 여전히 법 규율을 받는다`,`가명정보는 통계·과학적 연구·공익적 기록보존 목적에 한해 동의 없이 활용 가능하다`,`익명정보는 추가 정보와 결합하면 개인을 알아볼 수 있는 정보다`],a:2,
  e:`가명정보 = 법 적용 O, 단 통계·연구·공익적 기록보존 목적엔 동의 없이 활용 가능. 익명정보 = 법 적용 X.`},
 {q:`개인정보의 '동적성(Dynamicity)'에 관한 설명으로 가장 적절한 것은?`,
  o:[`수집 후 내용이 변경될 수 없는 고정 속성`,`단순 위치 데이터를 AI로 분석하면 종교·정치 견해 등 민감정보 수준의 새 의미가 파생될 수 있다`,`수집 목적과 무관하게 항상 동일한 민감도를 유지한다`,`동적성은 익명정보에만 해당한다`],a:1,
  e:`동적성 = 처리·분석으로 새로운 의미 파생. 일반정보였던 위치 데이터가 분석 결과 민감정보 수준이 되는 문제(Mosaic Effect).`},
 {q:`민감정보 처리에 관한 설명으로 옳지 않은 것은?`,
  o:[`원칙적 처리 금지, 예외적으로만 허용`,`별도 명시적 동의 또는 법령 근거가 있을 때만 처리 가능`,`별도 보관·접근권한 최소화·전송 암호화 등 강화된 보호조치 요구`,`다른 개인정보와 통합된 동의서에 함께 포함시켜 동의받을 수 있다`],a:3,
  e:`④가 틀림. 민감정보는 반드시 '다른 개인정보와 분리된 별도 동의서'로 받아야 함.`},
 {q:`주민등록번호 처리에 관한 설명 중 옳은 것은?`,
  o:[`정보주체가 동의하면 어떤 경우에도 수집·처리 가능`,`여권번호·운전면허번호와 동일한 기준이 적용된다`,`법령에 구체적 근거가 있는 경우에만 처리 가능하며, 동의만으로는 처리할 수 없다`,`별도 암호화 의무 없이 접근통제만 하면 된다`],a:2,
  e:`주민번호는 고유식별정보 중에서도 가장 엄격 — 법령 근거 없으면 당사자 동의로도 처리 불가.`},

 {sec:`12주차 · 2차시`, sub:`개인정보 생애주기`},
 {q:`개인정보 생애주기 5단계를 순서대로 올바르게 나열한 것은?`,
  o:[`수집 → 제공 → 이용 → 보관 → 파기`,`수집 → 이용 → 보관 → 제공 → 파기`,`수집 → 이용 → 제공 → 보관 → 파기`,`이용 → 수집 → 제공 → 보관 → 파기`],a:2,
  e:`수집 → 이용 → 제공 → 보관 → 파기.`},
 {q:`개인정보 수집·이용 단계에서 위법에 해당하는 사례는?`,
  o:[`서비스에 필요한 이름·이메일만 필수 항목으로 지정`,`이벤트용으로 수집한 이메일을 종료 후 별도 동의 없이 정기 뉴스레터에 활용`,`선택 항목 미입력자에게 기본 서비스를 그대로 제공`,`동의서에 목적·보유기간·제3자 제공을 구체적으로 명시`],a:1,
  e:`수집 목적(이벤트) 외 이용(뉴스레터) → '목적 외 이용' 위반. 나머지는 모두 적법.`},
 {q:`개인정보 파기에 관한 설명으로 옳지 않은 것은?`,
  o:[`보유기간 경과·목적 달성 시 지체 없이 파기해야 한다`,`전자파일은 복구 불가능한 완전 삭제·덮어쓰기로 파기해야 한다`,`파기 일시·방법·확인자를 기록해 1년 이상 보관해야 한다`,`다른 법령에 보존 의무가 있어도 예외 없이 즉시 파기해야 한다`],a:3,
  e:`④가 틀림. 다른 법령상 보존 의무가 있으면 즉시 파기하지 않고 '별도 분리 보관'한다.`},

 {sec:`12주차 · 3차시`, sub:`마이데이터·자기결정권`},
 {q:`마이데이터의 법적 기반 두 가지를 올바르게 묶은 것은?`,
  o:[`개인정보 자기결정권 + 데이터 전송요구권`,`개인정보 자기결정권 + 자동화 의사결정 대응권`,`데이터 전송요구권 + 처리정지 요구권`,`정보통신망법 + 신용정보법`],a:0,
  e:`헌법상 개인정보 자기결정권(철학적 토대) + 개인정보보호법상 전송요구권(실질적 수단).`},
 {q:`마이데이터 분야별 활용 사례의 연결이 옳지 않은 것은?`,
  o:[`금융 — 여러 은행·카드·보험을 한 앱에서 통합 조회·자산관리`,`공공 — 복지 신청 시 소득·재산 증명을 정부24에서 자동 연동`,`의료 — PHR로 여러 병원 진료기록·처방전을 통합 관리`,`통신 — 모든 가입자 위치 정보를 자동 수집해 광고사에 무단 제공`],a:3,
  e:`④는 '무단 제공' = 마이데이터(정보주체 통제)와 정반대의 위법 행위.`},
 {q:`마이데이터 서비스 이용 시 소비자 주의사항으로 옳지 않은 것은?`,
  o:[`필수·선택 항목을 구분해 꼭 필요한 항목에만 동의하는 것이 좋다`,`법적으로 안전이 보장되므로 보안 설정을 별도 확인할 필요가 없다`,`해지 시 이전에 전송된 데이터의 삭제를 요청할 권리가 있다`,`철회 절차가 동의보다 더 어렵게 설계되어선 안 된다`],a:1,
  e:`②가 틀림. 법적 기반이 있어도 이용자가 직접 보안 설정·동의 범위를 확인해야 함.`},
 {q:`마이데이터 2.0의 4가지 고도화 요소와 내용의 연결이 옳지 않은 것은?`,
  o:[`UX 혁신 — '알기 쉬운 동의' 가이드라인·통합 대시보드`,`데이터 품질 — 표준 스키마로 정합성·무결성 확보`,`인증·보안 — FIDO 생체인증·위협 모델링 기반 심사`,`중계 인프라 — 동의 범위를 무제한 확대해 트래픽을 늘림`],a:3,
  e:`④가 틀림. 중계 인프라 고도화는 API 허브·모니터링·안정성 관리이지 '동의 무제한 확대'가 아님(자기결정권 침해).`},
 {q:`개인정보 자기결정권에 관한 설명으로 가장 옳은 것은?`,
  o:[`개인정보보호법에서 처음 만들어진 권리다`,`정보를 보호받는 소극적 방어 권리에 그친다`,`헌법 제10조·제17조에 근거한 기본권이며 마이데이터의 철학적 토대다`,`정보주체가 아닌 개인정보처리자에게 귀속되는 권리다`],a:2,
  e:`헌법 제10조(존엄·가치)·제17조(사생활 비밀과 자유)에 근거한 헌법상 기본권. 소극적 방어 → 능동적 통제권으로 격상.`},

 {sec:`13주차 · 1차시`, sub:`공공성 개념·데이터 공공성 5차원`},
 {q:`독일어 'öffentlich'에서 파생된 공공성 개념에 관한 설명으로 옳은 것은?`,
  o:[`국가 통치 권력의 배타적 행사를 의미`,`동사 öffnen(열다)에서 파생돼 '누구에게나 열려있다'는 의미를 내포`,`라틴어 res publica와 동일한 어원`,`민족·혈통의 공동체성을 강조`],a:1,
  e:`öffentlich ← öffnen(열다) → '열려있음(개방성)'. 18세기 하버마스의 '공론장'으로 이론화. res publica는 별개 라틴어 어원.`},
 {q:`하버마스의 '공론장(Öffentlichkeit)'의 핵심 특징으로 가장 적절한 것은?`,
  o:[`국가 기관이 독점 운영하는 공식 토론 기구`,`소수 전문가만 참여하는 정책 자문 공간`,`사적 개인들이 공중으로 결집해 공적 사안을 이성적으로 토론하는 사회적 공간`,`알고리즘이 중재하는 완전 자동화 플랫폼`],a:2,
  e:`사적 개인 → 공중 결집 → 공적 사안의 이성적 토론. 18세기 살롱·커피하우스가 원형, 개방성이 본질.`},
 {q:`한국 근현대사 공공성 개념의 변천을 올바른 시간 순서로 나열한 것은?`,
  o:[`군사정권 국가중심 → 해방직후 이분법 → 민주화 언론 → 신자유주의 충돌`,`해방직후 이분법 → 군사정권 국가중심 → 민주화 언론 공공성 → 문민정부/IMF 가치충돌`,`민주화 언론 → 해방직후 이분법 → 군사정권 국가중심 → IMF 충돌`,`해방직후 이분법 → 민주화 언론 → 군사정권 국가중심 → 신자유주의 충돌`],a:1,
  e:`해방직후 항일(공)/친일(사) 이분법 → 군사정권 반공·국가중심 → 민주화 시민·언론 공공성 → 문민정부/IMF 신자유주의와 공공성 충돌.`},
 {q:`디지털 사회 공공성의 4차원 중 '취약계층 접근권 보장·배제 없는 서비스'에 해당하는 것은?`,
  o:[`투명성(Transparency)`,`책임성(Accountability)`,`참여성(Participation)`,`포용성(Inclusiveness)`],a:3,
  e:`포용성 = 디지털 격차 해소·취약계층 접근권·배제 없는 서비스. 투명성(공개), 책임성(추적·설명), 참여성(e-민주주의).`},
 {q:`데이터 공공성 5차원 중 '갈등 당사자·비당사자 간 관점 수용으로 갈등을 완화·치유하는 기능'은?`,
  o:[`공민성(Citizenship)`,`공개성(Openness)`,`공익성(Public Interest)`,`공감성(Empathy)`],a:3,
  e:`공감성 = 관점주의적 완충작용 → 사회적 치유. 공민성(주체성), 공개성(알권리), 공익성(가치 보존).`},

 {sec:`13주차 · 2차시`, sub:`디지털 양극화·기록 패러다임`},
 {q:`1995 NTIA의 '정보격차'가 2020 이후 '디지털 양극화'로 재개념화된 핵심 이유는?`,
  o:[`스마트폰 보급률 100%로 접근 격차가 완전 해소돼서`,`코로나19 이후 비대면 전환으로 단순 접근 차이가 생존·기회의 구조적 불평등으로 심화돼서`,`정부 보조금으로 기기 가격이 하락해서`,`AI로 UI가 직관적으로 개선돼서`],a:1,
  e:`코로나19 비대면 전환 → 교육·취업·의료·행정 전반의 기회 불평등 → 단순 격차(Divide)에서 구조적 양극화(Polarization)로.`},
 {q:`디지털 불평등의 3차원 구조를 올바르게 설명한 것은?`,
  o:[`접근격차 → 역량격차 → 소득격차`,`접근격차(Access) → 활용격차(Usage) → 결과·참여격차(Outcome)`,`소득격차 → 정보격차 → 문화격차`,`순서 없이 복합적으로 동시에 나타난다`],a:1,
  e:`접근(기기·인프라) → 활용(리터러시) → 결과·참여(경제·정치 기회). 앞 단계가 해결돼야 다음으로 나아가는 단계 구조.`},
 {q:`'문화맹(Cultural Illiteracy)' 개념에 관한 설명으로 옳지 않은 것은?`,
  o:[`'컴맹'·'넷맹'보다 심층적인 문제다`,`정보를 비판적으로 해석·수용하는 능력의 부재다`,`기기 보급만으로 해결할 수 없고 교육·사회적 개입이 필요하다`,`주로 고소득층 청년층의 정보 과잉 소비 현상이다`],a:3,
  e:`④가 틀림. 문화맹은 고령·저소득·저학력 등 취약계층의 '리터러시 결여' 문제. 고소득 청년 현상이 아님.`},
 {q:`1970년대 Hans Booms와 Howard Zinn이 주장한 '능동적 기록화'의 핵심은?`,
  o:[`기록의 물리적 보존을 위해 디지털화 기술을 도입`,`아키비스트가 사회 이슈에 능동 개입해 소외 집단의 기록을 적극 발굴·수집`,`기능·맥락 중심의 거시평가 실시`,`기록을 집단 기억 형성의 매체로 인식`],a:1,
  e:`아키비스트 중립성 신화 비판 → 소외 집단 목소리 능동 발굴. ③거시평가는 1980s, ④집단 기억은 1990s Nora.`},
 {q:`아카이브의 4대 공적 기능 중 '시민이 정치 기록에 접근해 정보를 얻고 권력이 교섭되는 소통의 장'은?`,
  o:[`관점주의적 완충작용`,`정치적 공유지`,`정치적 공론장`,`시민의 권력작용`],a:2,
  e:`정치적 공론장. 완충작용(갈등 완화), 공유지(대안 가치·합의), 권력작용(부당 권력 대항).`},

 {sec:`13주차 · 3차시`, sub:`격차 측정지표·취약계층`},
 {q:`2020 디지털 정보격차 실태조사에서 일반 국민 100 대비 정보취약계층의 종합 수준은?`,
  o:[`88.5%`,`55.4%`,`72.7%`,`63.1%`],a:2,
  e:`72.7% (약 27.3%p 격차). 접근성·역량·활용 3영역 종합 지수.`},
 {q:`취약계층별 디지털 격차 특성에 관한 설명으로 옳지 않은 것은?`,
  o:[`고령층은 홈뱅킹·전자상거래 이용률이 낮고 새 서비스 적응이 어렵다`,`장애인은 키오스크·앱의 물리적 접근성이 취약하고 배리어프리가 미비하다`,`저소득층·농어민은 기기 보유·통신비 부담, 지리적 인프라 취약이 장벽이다`,`저학력층의 핵심 문제는 기기 구입 비용으로 아예 접속하지 못하는 접근격차다`],a:3,
  e:`④가 틀림. 저학력층의 핵심은 접근격차가 아니라 '활용·참여 격차'(리터러시·고급 활용 역량 부족).`},
 {q:`디지털 격차와 삶의 만족도 간 상관관계에 관한 설명으로 옳은 것은?`,
  o:[`정보격차가 높을수록 만족도가 높아지는 양의 상관`,`컴퓨터 보유·인터넷 이용이 오히려 격차를 심화시킨다`,`정보격차가 높을수록 만족도가 낮아지는 음의 상관이 확인된다`,`통계적으로 유의한 관계가 없다`],a:2,
  e:`정보격차 ↑ → 삶의 만족도 ↓ (음의 상관). 반대로 활용 역량 ↑ 는 삶의 질을 높이는 완화 요인.`},
 {q:`데이터 공공성 5차원 중 '평범한 시민의 삶·목소리도 역사의 일부가 되어야 한다'는 원칙은?`,
  o:[`공민성(Citizenship)`,`공개성(Openness)`,`공감성(Empathy)`,`역사성(Historicity)`],a:3,
  e:`역사성 = 기록 행위 자체가 역사적 행위, '주체의 역사화'(지배층 너머 소외 집단까지).`},

 {sec:`14주차 · 1차시`, sub:`경제·AI 투자 양극화·보편적 이용권`},
 {q:`2025–2026 경제적 양극화가 디지털 격차를 심화시키는 메커니즘으로 가장 적절한 것은?`,
  o:[`중산층 붕괴·소득 양극화로 최신 기기·서비스 비용 부담이 커져 디지털 빈곤화가 가속된다`,`고소득층 소비 증가가 가격을 낮춰 저소득층 접근성이 향상된다`,`AI로 기기 가격이 폭락해 경제 양극화와 디지털 격차가 완전 분리된다`,`경제 불평등은 디지털 격차와 통계적으로 무관하다`],a:0,
  e:`경제력 ↓ → 기기·구독 서비스 비용 부담 ↑ → 접근·활용 격차 ↑ → 경제 불평등 악화의 악순환.`},
 {q:`'Top 5 기업이 AI 투자의 70% 이상 차지'가 사회적으로 초래하는 주된 결과는?`,
  o:[`AI 기술이 빠르게 민주화돼 누구나 최첨단 AI를 쉽게 쓴다`,`투자 공백으로 지역 생태계가 소외되고 스타트업 자금난이 심화돼 양극화가 가속된다`,`경쟁이 활발해져 AI 품질이 균등하게 향상된다`,`소수 집중으로 AI 안전성·윤리성이 강화된다`],a:1,
  e:`투자 편중 → 지역 생태계 소외·중소 AI 고사 → 양극화 가속. 대안: 오픈소스 AI 공유·중소기업 지원.`},
 {q:`AI 시대 보편적 이용권(Universal Access)의 3가지 구성 요소는?`,
  o:[`접근성·사용성·신뢰성`,`효율성·경제성·보안성`,`속도·편의성·수익성`,`개방성·공유성·영구성`],a:0,
  e:`접근성(인프라) + 사용성(직관 UI·보조기술) + 신뢰성(개인정보·XAI·보안). 셋이 동시 충족돼야 실질적 보편 이용.`},
 {q:`과기정통부 '디지털 배움터' 교육 과정 구성에 관한 설명으로 옳지 않은 것은?`,
  o:[`스마트폰 기초 — 메신저·앱 설치·기본 보안`,`생활밀착형 실습 — 키오스크 주문·무인 발권`,`금융·보안 — 모바일 뱅킹·보이스피싱 대응`,`정부·공공서비스 과정은 오직 대학생·30~40대 경력직 대상의 고급 과정이다`],a:3,
  e:`④가 틀림. 디지털 배움터는 고령·장애·저소득 등 디지털 소외 취약계층이 주 대상인 실용 교육.`},
 {q:`2025 디지털 소외계층 지원사업 로드맵의 핵심 전략 3대 축은?`,
  o:[`기기 개발 + AI 고도화 + 글로벌 진출`,`접근성 제고(인프라) + 실용 역량 강화(교육) + 연계·협력(민관)`,`빅데이터 수집 + 알고리즘 개선 + 수익 창출`,`개인정보 보호 + 플랫폼 규제 + 민영화`],a:1,
  e:`접근성(인프라) + 역량(단계적 교육) + 연계·협력(지역·기업 CSR·배움터 민관 협력). 목표: 포용적 디지털 환경.`},

 {sec:`14주차 · 2차시`, sub:`키오스크·배리어프리·포용 전략`},
 {q:`키오스크 이용 불편 사유 1·2위를 올바르게 나열한 것은?`,
  o:[`비용 부담(65%) > 인터넷 속도(52%)`,`조작이 어렵다(51.5%) > 눈치가 보인다(49.0%)`,`개인정보 유출 우려(58%) > 결제 오류(47%)`,`언어 장벽(54%) > 시력 저하(43%)`],a:1,
  e:`1위 조작 어려움(51.5%), 2위 눈치 보임(49.0%). 기술적 문제 + 심리적 압박이 함께 장벽.`},
 {q:`배리어프리 키오스크 의무화 2026에 관한 설명으로 옳은 것은?`,
  o:[`2026년 1월부터 공공기관에만 적용되고 민간은 자율`,`유예 종료 후 공공·민간 전면 전환 의무화, 위반 시 과태료`,`음성 안내 기능만 추가하면 요건 충족`,`신규 설치 키오스크에만 적용되고 기존은 면제`],a:1,
  e:`2026.1 시행 — 공공·민간 모두 전면 전환 의무. 높낮이 조절·음성 안내·점자·고대비·글자 크기 모두 필수, 위반 시 과태료.`},
 {q:`2020 코로나19 마스크 대란에서 도출된 디지털 포용성 교훈으로 옳지 않은 것은?`,
  o:[`위기 시 필수 물자 배분의 디지털 의존도를 재검토해야 한다`,`온라인 재고 시스템과 병행하는 오프라인 대안 채널이 필수다`,`위기일수록 디지털 정보 접근의 형평성 보장이 시급하다`,`모든 국민에게 앱 사용 의무화 교육을 하면 위기 시 디지털 격차가 완전히 해소된다`],a:3,
  e:`④가 틀림. 앱 의무화만으로는 구조적 격차가 해소되지 않음. 오프라인 대안·설계 단계 포용성 내재화가 핵심.`},
 {q:`디지털 취약계층의 개인정보 침해 위험 요소에 관한 설명으로 옳지 않은 것은?`,
  o:[`리터러시 부족으로 보이스피싱·스미싱에 더 취약하다`,`복잡한 약관을 이해 못 해 불리한 조건에 무의식적으로 동의할 위험이 있다`,`AI 딥페이크 보이스피싱 고도화로 피해 위험이 증가한다`,`취약계층은 보호 인식이 높아 일반인보다 2차 사기 피해율이 낮다`],a:3,
  e:`④가 틀림(사실과 반대). 낮은 보안 인식·대응 역량으로 2차 사기(명의 도용 등)에 더 취약.`},
 {q:`포용적 디지털 전환 통합 전략의 4대 축과 내용의 연결이 옳지 않은 것은?`,
  o:[`기술 — 배리어프리 설계 의무화·오픈소스 AI·보조기술 개발`,`제도 — 디지털포용법 강화·접근성 위반 제재·AI 공정성 감사`,`교육 — 디지털 배움터 확대·AI 리터러시 표준화·평생학습 포털`,`문화 — 기업 수익 극대화·디지털 소비 장려·플랫폼 독점 확대`],a:3,
  e:`④가 틀림. 문화 축은 디지털 배제 감수성 캠페인·세대 간 멘토링·지역 포용 거버넌스. 수익 극대화·독점은 정반대.`},

 {sec:`14주차 · 3차시`, sub:`디지털포용법·종합 비교`},
 {q:`2026년 시행된 디지털포용법의 핵심 시사점으로 가장 적절한 것은?`,
  o:[`접근성보다 기술적 효율성·성능 향상에 집중해야 한다`,`기획·설계 단계부터 포용성을 기본값으로 적용하는 '포용 설계(Inclusive Design)'를 법제화한다`,`경제적 여유가 있는 집단만 이용하는 것이 사회적으로 효율적이다`,`공공기관에만 적용되고 민간은 자율 준수다`],a:1,
  e:`핵심은 '포용 설계의 법제화' — 사후 격차 해소가 아니라 설계 단계부터 포용성이 기본값(Default).`},
 {q:`AI 시대 포용적 교육 역량 프레임의 3단계 구성으로 올바른 것은?`,
  o:[`초급(프로그래밍) → 중급(데이터 분석) → 고급(AI 개발)`,`기초(접근·사용) → 응용(탐색·보안) → 심화(AI 활용·윤리)`,`입문(인터넷 가입) → 일반(SNS) → 전문(코딩)`,`시작(기기 구입) → 성장(앱 설치) → 완성(유튜브 시청)`],a:1,
  e:`기초(기기 활용·보안) → 응용(정보 탐색·신뢰성 평가·보안) → 심화(프롬프트 엔지니어링·AI 윤리·데이터 리터러시).`},
 {q:`13주차와 14주차의 핵심 내용을 올바르게 비교한 것은?`,
  o:[`13주차는 배제 사례, 14주차는 공공성 어원·이론`,`13주차는 공공성 개념·이론 틀(5차원·기록 패러다임)을 정립하고, 14주차는 그 틀로 양극화 현상·배제·포용 정책을 분석한다`,`두 주차는 동일 내용을 강조점만 달리해 반복한다`,`13주차는 해외 사례, 14주차는 국내 법률 조문 암기다`],a:1,
  e:`13주차 = 개념(Concepts), 14주차 = 현상(Phenomena). 이론 틀 → 현실 분석으로 이어지는 관계.`},
 {q:`글로벌 디지털 격차 맥락에서 한국이 수행할 수 있는 역할로 가장 적절한 것은?`,
  o:[`내부 격차가 없으므로 기술 수출에만 집중해야 한다`,`OECD 포용 우수 사례를 공유하고 ODA 인프라 지원으로 '디지털 한류' 포용 모델을 수출할 수 있다`,`글로벌 격차는 선진국 책임이 아니므로 개입하지 않는다`,`한국 IT 기업의 무제한 시장 진출을 허용해야 한다`],a:1,
  e:`내부 격차(72.7%) 해소 노하우를 OECD 우수사례로 공유 + ODA 기여 + '디지털 한류' 포용 모델 수출.`},
 {essay:true, q:`[서술형] 배리어프리 키오스크 의무화에 따른 소상공인 비용 부담과 취약계층 접근성 보장 사이의 적절한 균형점은?`,
  model:`접근성 기준은 공익적 의무로 유지하되, 그 이행 비용을 소상공인에게 전가하지 않고 국가·지자체의 보조금·세제 지원과 단계적 유예를 통해 공공이 분담하는 지점이 적절한 균형점이다. 즉 '의무는 유지 + 비용은 공공 분담 + 이행은 단계적 유예'의 3요소로 정리할 수 있다.`},
];

const NUM = ['①','②','③','④','⑤'];
const quiz = document.getElementById('quiz');
let total = 0, answered = 0, correct = 0;

DATA.forEach((d) => {
  if(d.sec){
    const h = document.createElement('div');
    h.className = 'sec' + (d.pred ? ' pred' : '');
    h.innerHTML = d.sec + (d.sub ? ` <span class="badge">${d.sub}</span>` : '');
    quiz.appendChild(h);
    if(d.note){
      const n = document.createElement('div');
      n.className = 'note';
      n.textContent = d.note;
      quiz.appendChild(n);
    }
    return;
  }
  const wrap = document.createElement('div');
  wrap.className = 'q';

  if(d.essay){
    const head = document.createElement('div');
    head.className = 'qhead';
    head.innerHTML = d.q;
    wrap.appendChild(head);
    const box = document.createElement('div');
    box.className = 'essay';
    const btn = document.createElement('button');
    btn.className = 'reveal';
    btn.textContent = '모범답안 보기';
    const model = document.createElement('div');
    model.className = 'model';
    model.innerHTML = `<b>모범답안</b> — ${d.model}`;
    btn.onclick = () => { model.classList.toggle('show'); };
    box.appendChild(btn);
    box.appendChild(model);
    wrap.appendChild(box);
    quiz.appendChild(wrap);
    return;
  }

  total++;
  const idx = total;
  const head = document.createElement('div');
  head.className = 'qhead';
  head.innerHTML = `<span class="qnum">${idx}.</span>${d.q}`;
  wrap.appendChild(head);
  const opts = [];
  d.o.forEach((txt, j) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = `<span class="mk">${NUM[j]}</span>${txt}`;
    b.onclick = () => choose(wrap, opts, d, j, exp);
    wrap.appendChild(b);
    opts.push(b);
  });
  const exp = document.createElement('div');
  exp.className = 'exp';
  exp.innerHTML = `<b>정답 ${NUM[d.a]}</b> — ${d.e}`;
  wrap.appendChild(exp);
  wrap.dataset.done = '0';
  quiz.appendChild(wrap);
});

updateScore();

function choose(wrap, opts, d, j, exp){
  if(wrap.dataset.done === '1') return;
  wrap.dataset.done = '1';
  wrap.classList.add('locked');
  opts.forEach((b, k) => {
    if(k === d.a) b.classList.add('correct');
    else if(k === j) b.classList.add('wrong');
  });
  exp.classList.add('show');
  answered++;
  if(j === d.a) correct++;
  updateScore();
}
function updateScore(){
  document.getElementById('score').textContent = `푼 문제 ${answered} / ${total} · 정답 ${correct}`;
}
document.getElementById('revealAll').onclick = () => {
  const mcData = DATA.filter(d => !d.sec && !d.essay);
  const wraps = [...document.querySelectorAll('.q')].filter(w => w.querySelector('.exp'));
  wraps.forEach((wrap, i) => {
    wrap.dataset.done = '1';
    wrap.classList.add('locked');
    wrap.querySelector('.exp').classList.add('show');
    const opts = wrap.querySelectorAll('.opt');
    const d = mcData[i];
    if(d && opts[d.a]) opts[d.a].classList.add('correct');
  });
  document.querySelectorAll('.essay .model').forEach(m => m.classList.add('show'));
};
document.getElementById('reset').onclick = () => { location.reload(); };
</script>
</body>
